<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - CrewWave</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="auth-bg"> <div class="glass-card fade-in">
      <div id="errorBox" class="alert alert-danger d-none" role="alert">
  Грешно потребителско име или парола.
</div>

    <div class="text-center mb-4">
            <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
            <h2 class="fw-bold text-white">ДОБРЕ ДОШЛИ</h2>
            <p class="text-white">Влезте в системата за обучение</p>
        </div>

        <form action="/auth/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-white small">Потребителско име</label>
                <input type="text" name="username" class="form-control auth-input" placeholder="Вашето име..." required>
            </div>
            <div class="mb-4">
                <label class="form-label text-white small">Парола</label>
                <input type="password" name="password" class="form-control auth-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-custom w-100 py-3 shadow-lg">ВЛЕЗ В ПРОФИЛА</button>
        </form>
<div class="text-center mt-3">
  <a href="/forgot-password" class="auth-link">ЗАБРАВЕНА ПАРОЛА?</a>
</div>

        <div class="text-center mt-4 pt-3 border-top border-secondary">
            <p class="mb-2 text-white">Все още нямате акаунт?</p>
            <a href="/register" class="auth-link">СЪЗДАЙ РЕГИСТРАЦИЯ ТУК</a>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-white small text-decoration-none">← Обратно към сайта</a>
        </div>
    </div>
<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");

  if (error === "invalid") {
    document.getElementById("errorBox").classList.remove("d-none");
  }

  if (error === "missing") {
    const box = document.getElementById("errorBox");
    box.textContent = "Моля, попълнете потребителско име и парола.";
    box.classList.remove("d-none");
  }

  if (error === "server") {
    const box = document.getElementById("errorBox");
    box.textContent = "Възникна сървърна грешка. Опитай отново.";
    box.classList.remove("d-none");
  }
</script>

</body>
</html>
