<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Забравена парола</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-bg">

  <div class="glass-card fade-in">
    <div class="text-center mb-4">
      <div style="font-size: 3rem; margin-bottom: 10px;">🔑</div>
      <h2 class="fw-bold text-white">ЗАБРАВЕНА ПАРОЛА</h2>
      <p class="text-white-50">Въведи username + email и задай нова парола</p>
    </div>

    <div id="msgBox" class="alert d-none" role="alert"></div>

    <form action="/auth/forgot-password" method="POST">
      <div class="mb-3">
        <label class="form-label text-white-50 small">Потребителско име</label>
        <input type="text" name="username" class="form-control auth-input" required>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50 small">Имейл</label>
        <input type="email" name="email" class="form-control auth-input" required>
      </div>

      <div class="mb-3">
        <label class="form-label text-white-50 small">Нова парола</label>
        <input type="password" name="newPassword" class="form-control auth-input" required>
      </div>

      <div class="mb-4">
        <label class="form-label text-white-50 small">Повтори новата парола</label>
        <input type="password" name="confirmPassword" class="form-control auth-input" required>
      </div>

      <button type="submit" class="btn btn-custom w-100 py-3 shadow-lg">
        СМЕНИ ПАРОЛАТА
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/login" class="text-white-50 small text-decoration-none">← Обратно към вход</a>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(location.search);
    const e = p.get("error");
    const box = document.getElementById("msgBox");

    if (e) {
      box.classList.remove("d-none");
      box.classList.add("alert-danger");

      if (e === "missing") box.textContent = "Моля, попълни всички полета.";
      else if (e === "nomatch") box.textContent = "Паролите не съвпадат.";
      else if (e === "notfound") box.textContent = "Няма потребител с този username и email.";
      else box.textContent = "Сървърна грешка. Опитай отново.";
    }
  </script>
</body>
</html>
