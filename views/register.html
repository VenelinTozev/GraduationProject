<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - CrewWave</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="auth-bg">

  <div class="glass-card">
    <div class="text-center mb-4">
      <div style="font-size: 3rem; margin-bottom: 10px;">🚀</div>
      <h2 class="fw-bold text-white">НОВ ПРОФИЛ</h2>
      <p class="text-white">Станете част от екипа</p>
    </div>

    <!-- ✅ ERROR BOX -->
    <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

    <form action="/auth/register" method="POST">
      <div class="mb-3">
        <label class="form-label text-white small">Потребителско име</label>
        <input type="text" name="username" class="form-control auth-input" placeholder="Измислете си име..." required>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label text-white small">Име</label>
          <input type="text" name="first_name" class="form-control auth-input" placeholder="Вашето име" required>
        </div>
        <div class="col">
          <label class="form-label text-white small">Фамилия</label>
          <input type="text" name="last_name" class="form-control auth-input" placeholder="Вашата фамилия" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-white small">Имейл адрес</label>
        <input type="email" name="email" class="form-control auth-input" placeholder="vashiat@email.com" required>
      </div>

      <div class="mb-4">
        <label class="form-label text-white small">Парола</label>
        <input type="password" name="password" class="form-control auth-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-custom w-100 py-3 shadow-lg">РЕГИСТРИРАЙ СЕ</button>
    </form>

    <div class="text-center mt-4 pt-3 border-top border-secondary">
      <p class="mb-2 text-white">Вече имате профил?</p>
      <a href="/login" class="auth-link">ВЛЕЗ ОТТУК</a>
    </div>

    <div class="text-center mt-3">
      <a href="/" class="text-white small text-decoration-none">← Обратно към сайта</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");
    const msg = params.get("msg");

    if (error) {
      const box = document.getElementById("errorBox");
      box.classList.remove("d-none");

      if (msg) {
        box.textContent = decodeURIComponent(msg);
      } else if (error === "missing") {
        box.textContent = "Моля, попълнете всички полета.";
      } else if (error === "server") {
        box.textContent = "Възникна сървърна грешка. Опитайте отново.";
      } else {
        box.textContent = "Грешка при регистрация.";
      }
    }
  </script>

</body>
</html>
